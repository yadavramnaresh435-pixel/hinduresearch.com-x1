<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Om Hindu Research Portal</title>

<!-- Google Fonts: Devanagari-friendly serif for brand, clean sans for nav -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-cream: #fff5eb;
    --saffron: #ff6600;
    --saffron-dark: #cc5200;
    --gold: #d4a017;
    --text-dark: #2e2a26;
    --text-muted: #6b645c;
    --border-soft: #f0ddc4;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: var(--bg-cream);
    color: var(--text-dark);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--bg-cream);
    border-bottom: 2px solid var(--saffron);
    box-shadow: 0 2px 10px rgba(255, 102, 0, 0.06);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  /* Brand / Logo */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-dark);
  }

  .om-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    min-width: 38px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--saffron), var(--gold));
    color: #fff5eb;
    font-size: 20px;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(204, 82, 0, 0.35);
  }

  .brand-text {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 19px;
    line-height: 1.15;
    letter-spacing: 0.2px;
  }

  .brand-text .brand-accent {
    color: var(--saffron-dark);
  }

  /* ===== NAV (desktop) ===== */
  .main-nav {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .main-nav a {
    text-decoration: none;
    color: var(--text-dark);
    font-size: 15px;
    font-weight: 500;
    position: relative;
    padding: 4px 2px;
    transition: color 0.2s ease;
  }

  .main-nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 2px;
    background-color: var(--saffron);
    transition: width 0.25s ease;
  }

  .main-nav a:hover,
  .main-nav a:focus-visible {
    color: var(--saffron-dark);
  }

  .main-nav a:hover::after,
  .main-nav a:focus-visible::after {
    width: 100%;
  }

  /* ===== Right side controls ===== */
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Language Switcher */
  .lang-switch {
    display: flex;
    align-items: center;
    background-color: #ffffff;
    border: 1.5px solid var(--saffron);
    border-radius: 999px;
    padding: 3px;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .lang-switch button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--saffron-dark);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .lang-switch button.active {
    background-color: var(--saffron);
    color: #fff5eb;
  }

  /* Hamburger (mobile only) */
  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
  }

  .nav-toggle span {
    width: 22px;
    height: 2.5px;
    background-color: var(--saffron-dark);
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .nav-toggle.open span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }
  .nav-toggle.open span:nth-child(2) {
    opacity: 0;
  }
  .nav-toggle.open span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  /* ===== Mobile responsive ===== */
  @media (max-width: 760px) {
    .brand-text {
      font-size: 16px;
    }

    .main-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--bg-cream);
      border-bottom: 2px solid var(--saffron);
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .main-nav.open {
      max-height: 280px;
    }

    .main-nav a {
      width: 100%;
      padding: 14px 20px;
      border-top: 1px solid var(--border-soft);
    }

    .main-nav a::after {
      display: none;
    }

    .nav-toggle {
      display: flex;
    }

    .lang-switch button {
      padding: 5px 9px;
      font-size: 12px;
    }
  }

  /* ===== RISHI AI — STICKY BOTTOM-LEFT WIDGET ===== */
  .rishi-widget {
    position: fixed;
    bottom: 18px;
    left: 18px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(145deg, #ffffff, #fff8ef);
    border: 1.5px solid var(--saffron);
    border-radius: 999px;
    padding: 9px 18px 9px 9px;
    box-shadow: 0 8px 22px rgba(204, 82, 0, 0.22);
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.3s ease, box-shadow 0.2s ease;
  }

  .rishi-widget:hover,
  .rishi-widget:focus-visible {
    box-shadow: 0 10px 26px rgba(204, 82, 0, 0.32);
  }

  /* While actively being dragged, kill the transition so it tracks the finger 1:1 */
  .rishi-widget.dragging {
    transition: none;
    cursor: grabbing;
  }

  /* Compact state once the page is scrolled — shrinks ~30% */
  .rishi-widget.compact {
    padding: 6px 12px 6px 6px;
    transform: scale(0.78);
    transform-origin: bottom left;
  }

  .rishi-widget-avatar {
    width: 34px;
    height: 34px;
    min-width: 34px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--saffron), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff5eb;
    font-size: 16px;
    font-weight: 700;
    animation: rishiPulseGlow 2.6s ease-in-out infinite;
  }

  @keyframes rishiPulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.35); }
    50% { box-shadow: 0 0 0 7px rgba(255, 102, 0, 0); }
  }

  .rishi-widget-label {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--saffron-dark);
    white-space: nowrap;
  }

  /* ===== RISHI AI — AUTH MODAL ===== */
  .rishi-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(46, 42, 38, 0.45);
    backdrop-filter: blur(2px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .rishi-modal-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .rishi-modal {
    position: relative;
    background-color: #fff8ef;
    border: 1.5px solid var(--border-soft);
    border-top: 4px solid var(--saffron);
    border-radius: 18px;
    max-width: 380px;
    width: 100%;
    padding: 34px 28px 28px;
    text-align: center;
    transform: translateY(14px) scale(0.97);
    transition: transform 0.3s ease;
    box-shadow: 0 18px 50px rgba(46, 42, 38, 0.25);
    max-height: 90vh;
    overflow-y: auto;
  }

  .rishi-modal-overlay.visible .rishi-modal {
    transform: translateY(0) scale(1);
  }

  .rishi-modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background-color: var(--border-soft);
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .rishi-modal-close:hover,
  .rishi-modal-close:focus-visible {
    background-color: var(--saffron);
    color: #ffffff;
  }

  .rishi-modal-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    margin: 0 auto 16px;
    background: linear-gradient(145deg, var(--saffron), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff5eb;
    font-size: 24px;
    font-weight: 700;
  }

  .rishi-modal h3 {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 20px;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .rishi-modal p {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .rishi-form-field {
    text-align: left;
    margin-bottom: 14px;
  }

  .rishi-form-field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 5px;
  }

  .rishi-form-field input {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border-soft);
    border-radius: 9px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-dark);
    background-color: #ffffff;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .rishi-form-field input:focus {
    border-color: var(--saffron);
  }

  .rishi-modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
  }

  .rishi-modal-actions button {
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
  }

  .rishi-btn-primary {
    border: none;
    background: linear-gradient(145deg, var(--saffron), var(--saffron-dark));
    color: #ffffff;
  }

  .rishi-btn-primary:hover,
  .rishi-btn-primary:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(204, 82, 0, 0.35);
  }

  .rishi-btn-secondary {
    border: 1.5px solid var(--border-soft);
    background-color: transparent;
    color: var(--text-dark);
  }

  .rishi-btn-secondary:hover,
  .rishi-btn-secondary:focus-visible {
    background-color: #ffffff;
  }

  .rishi-modal-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    font-size: 11.5px;
    color: #b3a89b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .rishi-modal-divider::before,
  .rishi-modal-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background-color: var(--border-soft);
  }

  .rishi-demo-link {
    background: none;
    border: none;
    color: var(--saffron-dark);
    font-size: 13px;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px;
  }

  /* ===== RISHI AI — FULL CHAT OVERLAY (slide-up, post-login) ===== */
  .rishi-chat-overlay {
    position: fixed;
    inset: 0;
    z-index: 600;
    background-color: var(--bg-cream);
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .rishi-chat-overlay.open {
    transform: translateY(0);
  }

  .rishi-chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1.5px solid var(--border-soft);
    background-color: var(--bg-cream);
    flex-shrink: 0;
  }

  .rishi-chat-header-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 700;
    color: var(--saffron-dark);
    font-size: 15px;
  }

  .rishi-chat-header-brand .om-mark {
    width: 30px;
    height: 30px;
    font-size: 15px;
  }

  .rishi-chat-close {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background-color: var(--border-soft);
    color: var(--text-muted);
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .rishi-chat-close:hover,
  .rishi-chat-close:focus-visible {
    background-color: var(--saffron);
    color: #ffffff;
  }

  .rishi-chat-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    overflow-y: auto;
  }

  .rishi-chat-empty-title {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: clamp(36px, 9vw, 56px);
    font-weight: 700;
    line-height: 1.05;
    background: linear-gradient(120deg, var(--saffron-dark), var(--gold) 45%, var(--saffron));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }

  .rishi-chat-empty-sub {
    font-size: clamp(13px, 2.4vw, 15.5px);
    color: var(--text-muted);
    font-weight: 500;
    max-width: 440px;
  }

  .rishi-chat-input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px;
    background-color: #ffffff;
    border: 1.5px solid var(--border-soft);
    border-radius: 999px;
    padding: 8px 8px 8px 22px;
    box-shadow: 0 8px 28px rgba(204, 82, 0, 0.10);
  }

  .rishi-chat-input-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14.5px;
    color: var(--text-dark);
    min-width: 0;
  }

  .rishi-chat-input-bar input::placeholder {
    color: #b3a89b;
  }

  .rishi-chat-send-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, var(--saffron), var(--saffron-dark));
    color: #fff5eb;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .rishi-chat-send-btn:hover,
  .rishi-chat-send-btn:focus-visible {
    transform: scale(1.06);
    box-shadow: 0 4px 14px rgba(204, 82, 0, 0.4);
  }

  @media (max-width: 600px) {
    .rishi-widget {
      bottom: 14px;
      left: 14px;
      padding: 8px 14px 8px 8px;
    }

    .rishi-widget-label {
      font-size: 12.5px;
    }

    .rishi-chat-input-bar {
      margin: 12px;
      padding: 7px 7px 7px 16px;
    }
  }

  /* ===== SWASTIKA EMBLEM ===== */
  .swastika-badge {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(165deg, #ffffff, #fff8ef);
    border: 1.5px solid var(--saffron);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(204, 82, 0, 0.15);
    z-index: 3;
  }

  .swastika-emblem {
    width: 30px;
    height: 30px;
    transform: rotate(0deg);
    transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1),
                filter 0.7s ease;
    filter: drop-shadow(0 0 0 rgba(255, 102, 0, 0));
  }

  .swastika-emblem.pulse {
    filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.6));
  }

  .swastika-emblem path,
  .swastika-emblem circle {
    fill: var(--saffron-dark);
  }

  @media (max-width: 600px) {
    .swastika-badge {
      width: 46px;
      height: 46px;
    }
    .swastika-emblem {
      width: 25px;
      height: 25px;
    }
  }

  /* ===== DAILY SANATAN FACTS SLIDER ===== */
  .facts-section {
    background-color: var(--bg-cream);
    padding: 38px 18px 36px;
  }

  .facts-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .facts-card {
    position: relative;
    background: linear-gradient(165deg, #ffffff, #fff8ef);
    border: 1.5px solid var(--border-soft);
    border-left: 5px solid var(--saffron);
    border-radius: 16px;
    padding: 34px 56px 26px;
    height: auto;
    display: flex;
    align-items: center;
    box-shadow: 0 6px 20px rgba(204, 82, 0, 0.07);
  }

  .facts-track {
    position: relative;
    width: 100%;
    height: auto;
  }

  .fact-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }

  .fact-slide.active {
    position: relative;
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .fact-source {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
    background-color: var(--saffron);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }

  .fact-text {
    font-size: 16px;
    line-height: 1.55;
    color: var(--text-dark);
    margin-bottom: 14px;
  }

  .fact-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .whatsapp-share {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background-color: #25d366;
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 999px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .whatsapp-share:hover,
  .whatsapp-share:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(37, 211, 102, 0.35);
  }

  .whatsapp-share svg {
    width: 14px;
    height: 14px;
    fill: #ffffff;
  }

  .facts-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--saffron);
    background-color: #ffffff;
    color: var(--saffron-dark);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease;
    z-index: 2;
  }

  .facts-arrow:hover,
  .facts-arrow:focus-visible {
    background-color: var(--saffron);
    color: #ffffff;
  }

  .facts-arrow-left { left: 10px; }
  .facts-arrow-right { right: 10px; }

  .facts-dots {
    display: flex;
    justify-content: center;
    gap: 7px;
    margin-top: 16px;
  }

  .facts-dots button {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: none;
    background-color: var(--border-soft);
    cursor: pointer;
    padding: 0;
    transition: background-color 0.2s ease, width 0.2s ease;
  }

  .facts-dots button.active {
    background-color: var(--saffron);
    width: 22px;
    border-radius: 5px;
  }

  @media (max-width: 600px) {
    .facts-card {
      padding: 22px 40px;
    }

    .fact-text {
      font-size: 14.5px;
    }

    .facts-arrow {
      width: 28px;
      height: 28px;
      font-size: 17px;
    }

    .facts-arrow-left { left: 4px; }
    .facts-arrow-right { right: 4px; }
  }

  /* ===== UNIVERSAL SEARCH BAR ===== */
  .search-section {
    padding: 0 18px 40px;
  }

  .search-inner {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .search-bar-wrap {
    position: relative;
    border-radius: 8px;
    padding: 1.5px;
    background: linear-gradient(120deg, #1b5e20, #81c784);
    box-shadow: 0 6px 18px rgba(27, 94, 32, 0.12);
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background-color: #ffffff;
    border-radius: 6.5px;
    padding: 13px 16px;
  }

  .search-icon {
    flex-shrink: 0;
    width: 19px;
    height: 19px;
    color: #2e7d32;
  }

  .search-bar input {
