<style>

    background:linear-gradient(90deg,var(--orange-soft),var(--gold) 60%,var(--orange-soft));

    background-clip:text;
    color:transparent;
    font-weight:700;
  }

    font-size:0.78rem;

    background:rgba(217,123,63,0.12);

  }

  }

const grid = document.getElementById('cardGrid');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');

function buildMapsUrl(query){
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query);
}

function renderCards(list){
  grid.innerHTML = "";

  if(list.length === 0){
    grid.innerHTML = '<div class="no-results">😔 कोई स्थान नहीं मिला। कृपया दूसरा शब्द खोजें।</div>';
    resultCount.textContent = "";
    return;
  }

  list.forEach(function(place, index){
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML =
      '<div class="card-image"><span class="place-no">#' + (index + 1) + '</span></div>' +
      '<div class="card-body">' +
        '<h2>' + place.name + '</h2>' +
        '<div class="state">' + place.state + '</div>' +
        '<p class="desc">' + place.desc + '</p>' +
        '<a class="maps-btn" href="' + buildMapsUrl(place.query) + '" target="_blank" rel="noopener noreferrer">🗺️ View on Google Maps</a>' +
      '</div>';

    grid.appendChild(card);
  });

  resultCount.textContent = list.length + " स्थान मिले";
}

function filterPlaces(){
  const term = searchInput.value.trim().toLowerCase();

  if(term === ""){
    renderCards(hinduPlaces);
    return;
  }

  const filtered = hinduPlaces.filter(function(place){
    return place.name.toLowerCase().includes(term) ||
           place.state.toLowerCase().includes(term) ||
           place.desc.toLowerCase().includes(term);
  });

  renderCards(filtered);
}

searchInput.addEventListener('input', filterPlaces);

renderCards(hinduPlaces);
</script>
